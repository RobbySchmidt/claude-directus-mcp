<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Alpenglühen an den Drei Zinnen">
  <defs>
    <linearGradient id="dz4-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a6a" />
      <stop offset="35%" stop-color="#c04060" />
      <stop offset="65%" stop-color="#f0a95c" />
      <stop offset="100%" stop-color="#f8c880" />
    </linearGradient>
    <linearGradient id="dz4-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c85030" />
      <stop offset="40%" stop-color="#a03828" />
      <stop offset="100%" stop-color="#3a2018" />
    </linearGradient>
    <linearGradient id="dz4-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3828" />
      <stop offset="100%" stop-color="#1a2418" />
    </linearGradient>
  </defs>

  <!-- Sky: deep dusk gradient -->
  <rect width="800" height="500" fill="url(#dz4-sky)" />

  <!-- Horizon glow -->
  <ellipse cx="400" cy="500" rx="500" ry="180" fill="#f0a95c" opacity="0.25" />

  <!-- Large cliff / rock face (Alpenglühen — warm orange-red glow) -->
  <path
    d="M100 0 L800 0 L800 420 L550 380 L400 350 L250 380 L100 360 Z"
    fill="url(#dz4-wall)"
  />

  <!-- Cliff face subtle cracks / texture -->
  <g stroke="#1f2b3a" stroke-width="1.5" opacity="0.18">
    <line x1="200" y1="0" x2="180" y2="360" />
    <line x1="380" y1="0" x2="350" y2="350" />
    <line x1="560" y1="0" x2="545" y2="380" />
    <line x1="700" y1="0" x2="695" y2="400" />
  </g>

  <!-- Snow/ice streaks glowing warm on the cliff -->
  <path d="M160 40 L260 20 L270 38 L148 58 Z" fill="#f8c880" opacity="0.45" />
  <path d="M420 10 L540 0 L540 18 L408 30 Z" fill="#f8c880" opacity="0.38" />
  <path d="M640 0 L760 0 L762 15 L628 18 Z" fill="#f8c880" opacity="0.35" />

  <!-- Left cliff wing (darker, receding into shadow) -->
  <path d="M0 0 L120 0 L120 360 L0 380 Z" fill="#1f2b3a" />

  <!-- Dark ground / foreground silhouette -->
  <path
    d="M0 370 Q200 355 400 368 Q600 380 800 362 L800 500 L0 500 Z"
    fill="url(#dz4-ground)"
  />

  <!-- Dark tree silhouettes in foreground -->
  <g fill="#1f2b3a">
    <!-- Left trees -->
    <polygon points="30,500 22,460 38,460" />
    <polygon points="30,462 20,440 40,440" />
    <polygon points="30,443 19,422 41,422" />
    <polygon points="30,424 18,404 42,404" />
    <rect x="27" y="458" width="6" height="14" />

    <polygon points="75,500 67,462 83,462" />
    <polygon points="75,464 65,444 85,444" />
    <polygon points="75,446 64,427 86,427" />
    <rect x="72" y="460" width="6" height="14" />

    <!-- Right trees -->
    <polygon points="720,500 712,462 728,462" />
    <polygon points="720,464 710,444 730,444" />
    <polygon points="720,446 709,427 731,427" />
    <polygon points="720,428 708,410 732,410" />
    <rect x="717" y="460" width="6" height="14" />

    <polygon points="760,500 752,468 768,468" />
    <polygon points="760,470 750,450 770,450" />
    <polygon points="760,452 750,434 770,434" />
    <rect x="757" y="466" width="6" height="12" />
  </g>

  <!-- Two small silhouette figures in foreground (centre) -->
  <g fill="#1a2010" transform="translate(360 408)">
    <rect x="-4" y="-20" width="7" height="14" rx="1" />
    <circle cx="0" cy="-23" r="5" />
  </g>
  <g fill="#1a2010" transform="translate(390 415)">
    <rect x="-4" y="-18" width="7" height="13" rx="1" />
    <circle cx="0" cy="-21" r="5" />
  </g>
</svg>
