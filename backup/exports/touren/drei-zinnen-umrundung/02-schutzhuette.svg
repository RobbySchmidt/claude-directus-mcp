<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Schutzhütte unter den Drei Zinnen">
  <defs>
    <linearGradient id="dz2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8ab0" />
      <stop offset="100%" stop-color="#aacce0" />
    </linearGradient>
    <linearGradient id="dz2-cliff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a6a7a" />
      <stop offset="100%" stop-color="#1f2b3a" />
    </linearGradient>
    <linearGradient id="dz2-scree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a98" />
      <stop offset="100%" stop-color="#4a5a68" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#dz2-sky)" />

  <!-- High cliff wall behind (fills upper half) -->
  <path
    d="M250 0 L800 0 L800 400 L350 380 L250 320 Z"
    fill="url(#dz2-cliff)"
  />
  <!-- Cliff face texture lines -->
  <g stroke="#1f2b3a" stroke-width="1" opacity="0.15">
    <line x1="350" y1="20" x2="320" y2="350" />
    <line x1="480" y1="0" x2="450" y2="400" />
    <line x1="610" y1="0" x2="590" y2="400" />
    <line x1="730" y1="0" x2="720" y2="380" />
  </g>
  <!-- Snow/ice on ledges of cliff -->
  <path d="M310 120 L390 100 L400 115 L300 135 Z" fill="#fbfaf5" opacity="0.5" />
  <path d="M500 80 L600 65 L610 80 L490 98 Z" fill="#fbfaf5" opacity="0.45" />
  <path d="M680 40 L780 30 L800 45 L670 60 Z" fill="#fbfaf5" opacity="0.4" />

  <!-- Scree / rocky slope (left and center) -->
  <path
    d="M0 320 L120 280 L250 320 L350 280 L400 300 L400 500 L0 500 Z"
    fill="url(#dz2-scree)"
  />
  <!-- Some rubble texture -->
  <g fill="#2a3a4a" opacity="0.5">
    <ellipse cx="60" cy="360" rx="12" ry="5" />
    <ellipse cx="150" cy="380" rx="9" ry="4" />
    <ellipse cx="250" cy="350" rx="14" ry="5" />
    <ellipse cx="340" cy="370" rx="10" ry="4" />
  </g>

  <!-- Ground platform for hut -->
  <path
    d="M0 380 Q200 368 450 378 L800 378 L800 500 L0 500 Z"
    fill="#4a6040"
  />

  <!-- Schutzhütte (mountain hut) -->
  <g transform="translate(100 340)">
    <!-- Foundation -->
    <rect x="0" y="50" width="130" height="5" fill="#3a2a18" />
    <!-- Main walls -->
    <rect x="0" y="22" width="130" height="38" fill="#7a5a38" />
    <!-- Roof (saddle) -->
    <polygon points="-6,22 65,-10 136,22" fill="#3a2010" />
    <!-- Side wall left (darker) -->
    <polygon points="0,22 0,60 -16,60 -16,32" fill="#5a3a20" />
    <!-- Windows -->
    <rect x="12" y="30" width="18" height="14" rx="1" fill="#f0d8a0" opacity="0.85" />
    <rect x="52" y="30" width="18" height="14" rx="1" fill="#f0d8a0" opacity="0.85" />
    <rect x="94" y="30" width="18" height="14" rx="1" fill="#f0d8a0" opacity="0.85" />
    <!-- Door -->
    <rect x="54" y="40" width="22" height="20" rx="1" fill="#2a1a08" />
    <!-- Chimney -->
    <rect x="90" y="-16" width="12" height="20" fill="#4a3020" />
    <rect x="87" y="-18" width="18" height="5" rx="1" fill="#3a2010" />
  </g>

  <!-- Red flag on hut roof -->
  <line x1="235" y1="286" x2="235" y2="260" stroke="#3a2010" stroke-width="2" />
  <polygon points="235,260 260,267 235,274" fill="#c0382a" />

  <!-- Rocky boulders in foreground -->
  <g fill="#3a4a5a">
    <ellipse cx="60" cy="440" rx="38" ry="22" />
    <ellipse cx="700" cy="450" rx="45" ry="24" />
    <ellipse cx="430" cy="460" rx="28" ry="15" />
  </g>
</svg>
