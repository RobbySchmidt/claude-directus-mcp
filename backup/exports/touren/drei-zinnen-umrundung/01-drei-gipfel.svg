<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Drei Zinnen im Morgenlicht">
  <defs>
    <linearGradient id="dz1-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7aaa" />
      <stop offset="55%" stop-color="#9dbcd6" />
      <stop offset="100%" stop-color="#c8dce8" />
    </linearGradient>
    <linearGradient id="dz1-rock-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a7a8a" />
      <stop offset="100%" stop-color="#2a3a4a" />
    </linearGradient>
    <linearGradient id="dz1-rock-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9aaa" />
      <stop offset="100%" stop-color="#3a4a5a" />
    </linearGradient>
    <linearGradient id="dz1-rock-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a9a" />
      <stop offset="100%" stop-color="#2a3a4a" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#dz1-sky)" />

  <!-- Subtle morning light glow top-right -->
  <circle cx="720" cy="80" r="90" fill="#f0a95c" opacity="0.12" />
  <circle cx="720" cy="80" r="50" fill="#f0a95c" opacity="0.18" />
  <circle cx="720" cy="80" r="25" fill="#f0a95c" opacity="0.6" />

  <!-- Distant plateau / Dolomite base range -->
  <path
    d="M0 340 L140 280 L250 310 L380 270 L520 300 L660 272 L800 295 L800 400 L0 400 Z"
    fill="#4a6a82"
  />

  <!-- Three Zinnen (three characteristic towers) -->
  <!-- Left Zinne (smaller, further) -->
  <path
    d="M200 340 L220 240 L230 220 L242 240 L265 290 L270 340 Z"
    fill="url(#dz1-rock-l)"
  />
  <!-- Left Zinne shadow face -->
  <path d="M230 222 L242 242 L265 292 L255 340 L230 340 Z" fill="#1f2b3a" opacity="0.35" />
  <!-- Left Zinne light dusting -->
  <path d="M220 240 L230 222 L235 238 Z" fill="#fbfaf5" opacity="0.6" />

  <!-- Middle Zinne (tallest, most iconic) -->
  <path
    d="M330 340 L360 200 L375 170 L392 200 L430 280 L440 340 Z"
    fill="url(#dz1-rock-m)"
  />
  <!-- Middle Zinne shadow face -->
  <path d="M375 172 L392 202 L430 282 L418 340 L375 340 Z" fill="#1f2b3a" opacity="0.38" />
  <!-- Snow/frost on top of middle -->
  <path d="M362 205 L375 172 L385 200 Z" fill="#fbfaf5" opacity="0.7" />

  <!-- Right Zinne (medium) -->
  <path
    d="M480 340 L510 230 L522 210 L536 230 L568 300 L575 340 Z"
    fill="url(#dz1-rock-r)"
  />
  <!-- Right Zinne shadow -->
  <path d="M522 212 L536 232 L568 302 L558 340 L522 340 Z" fill="#1f2b3a" opacity="0.35" />
  <!-- Snow on right -->
  <path d="M512 232 L522 212 L528 228 Z" fill="#fbfaf5" opacity="0.65" />

  <!-- Scree slope / rocky base connecting towers -->
  <path
    d="M180 340 L220 320 L270 340 L310 325 L440 340 L470 322 L575 340 L620 330 L680 340 L680 380 L180 380 Z"
    fill="#3a4a5a"
  />

  <!-- Foreground ground: gravel + sparse Alpine vegetation -->
  <path
    d="M0 380 Q200 372 400 380 Q600 388 800 378 L800 500 L0 500 Z"
    fill="#3a5a3a"
  />
  <!-- A few tufts of grass -->
  <g fill="#2f6b4e">
    <ellipse cx="100" cy="390" rx="20" ry="6" />
    <ellipse cx="300" cy="395" rx="16" ry="5" />
    <ellipse cx="550" cy="388" rx="22" ry="6" />
    <ellipse cx="720" cy="392" rx="18" ry="5" />
  </g>

  <!-- Thin mist band at base of towers -->
  <rect x="160" y="330" width="460" height="20" fill="#fbfaf5" opacity="0.12" />
</svg>
