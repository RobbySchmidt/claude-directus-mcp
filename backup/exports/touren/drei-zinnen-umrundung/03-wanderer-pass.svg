<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Wanderer auf dem Pass">
  <defs>
    <linearGradient id="dz3-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7aaa" />
      <stop offset="40%" stop-color="#8ab8d4" />
      <stop offset="100%" stop-color="#c0d8e8" />
    </linearGradient>
    <linearGradient id="dz3-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a98" />
      <stop offset="100%" stop-color="#3a4a58" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#dz3-sky)" />

  <!-- Cloud band (dramatic, wide) -->
  <ellipse cx="200" cy="130" rx="120" ry="22" fill="#fbfaf5" opacity="0.5" />
  <ellipse cx="280" cy="118" rx="90" ry="18" fill="#fbfaf5" opacity="0.4" />
  <ellipse cx="600" cy="110" rx="140" ry="20" fill="#fbfaf5" opacity="0.45" />
  <ellipse cx="680" cy="98" rx="100" ry="16" fill="#fbfaf5" opacity="0.35" />

  <!-- Wide panorama of far peaks (horizon line) -->
  <path
    d="M0 240 L60 170 L130 210 L210 145 L290 195 L370 155 L450 200 L530 150 L610 195 L690 155 L770 195 L800 178 L800 290 L0 290 Z"
    fill="#5a7a98"
  />
  <!-- Snow caps on distant peaks -->
  <path d="M192 162 L210 145 L228 165 L210 178 Z" fill="#fbfaf5" opacity="0.75" />
  <path d="M352 170 L370 155 L388 173 L370 185 Z" fill="#fbfaf5" opacity="0.7" />
  <path d="M512 164 L530 150 L548 167 L530 180 Z" fill="#fbfaf5" opacity="0.7" />
  <path d="M672 168 L690 155 L708 170 L690 182 Z" fill="#fbfaf5" opacity="0.65" />

  <!-- Pass saddle shape (mid layer) -->
  <path
    d="M0 290 L150 250 L320 285 L400 265 L480 285 L650 250 L800 275 L800 360 L0 360 Z"
    fill="#4a5a6a"
  />

  <!-- Pass ground (near) -->
  <path
    d="M0 340 Q200 328 400 338 Q600 348 800 335 L800 500 L0 500 Z"
    fill="url(#dz3-ground)"
  />

  <!-- Path / trail marks across the pass -->
  <path
    d="M0 390 Q200 380 400 375 Q600 370 800 380"
    fill="none" stroke="#a09080" stroke-width="8" stroke-dasharray="18,10" opacity="0.6"
  />

  <!-- Distant valley haze at pass level -->
  <rect x="0" y="280" width="800" height="30" fill="#9dbcd6" opacity="0.2" />

  <!-- Wanderer 1 (left, with pack and poles) -->
  <g fill="#1f2b3a" transform="translate(310 340)">
    <!-- body -->
    <rect x="-5" y="-30" width="10" height="22" rx="2" />
    <!-- head with hat -->
    <circle cx="0" cy="-35" r="7" />
    <ellipse cx="0" cy="-41" rx="9" ry="3" fill="#2f6b4e" />
    <!-- backpack -->
    <rect x="4" y="-28" width="9" height="16" rx="2" />
    <!-- left leg -->
    <line x1="-3" y1="-8" x2="-7" y2="12" stroke="#1f2b3a" stroke-width="4" stroke-linecap="round" />
    <!-- right leg (stepping forward) -->
    <line x1="3" y1="-8" x2="8" y2="10" stroke="#1f2b3a" stroke-width="4" stroke-linecap="round" />
    <!-- left arm -->
    <line x1="-5" y1="-22" x2="-12" y2="-8" stroke="#1f2b3a" stroke-width="3" stroke-linecap="round" />
    <!-- right arm -->
    <line x1="5" y1="-22" x2="12" y2="-8" stroke="#1f2b3a" stroke-width="3" stroke-linecap="round" />
    <!-- poles -->
    <line x1="-12" y1="-8" x2="-18" y2="14" stroke="#1f2b3a" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="-8" x2="18" y2="14" stroke="#1f2b3a" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Wanderer 2 (right, slightly behind) -->
  <g fill="#1f2b3a" transform="translate(380 348)">
    <rect x="-4" y="-26" width="9" height="19" rx="2" />
    <circle cx="0" cy="-30" r="6" />
    <ellipse cx="0" cy="-35" rx="8" ry="2.5" fill="#2f6b4e" />
    <rect x="4" y="-24" width="8" height="14" rx="2" />
    <line x1="-2" y1="-7" x2="-6" y2="10" stroke="#1f2b3a" stroke-width="3.5" stroke-linecap="round" />
    <line x1="3" y1="-7" x2="6" y2="9" stroke="#1f2b3a" stroke-width="3.5" stroke-linecap="round" />
    <line x1="-8" y1="-18" x2="-14" y2="12" stroke="#1f2b3a" stroke-width="2" stroke-linecap="round" />
    <line x1="8" y1="-18" x2="14" y2="12" stroke="#1f2b3a" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Some rocks on the pass -->
  <g fill="#2a3a4a" opacity="0.65">
    <ellipse cx="150" cy="380" rx="22" ry="10" />
    <ellipse cx="600" cy="374" rx="28" ry="11" />
    <ellipse cx="680" cy="392" rx="18" ry="8" />
  </g>
</svg>
