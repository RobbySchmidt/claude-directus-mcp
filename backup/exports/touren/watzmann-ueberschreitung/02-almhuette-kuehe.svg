<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Almhütte mit Kühen unterhalb des Watzmann">
  <defs>
    <linearGradient id="wm2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a9cc0" />
      <stop offset="100%" stop-color="#c8e0f0" />
    </linearGradient>
    <linearGradient id="wm2-meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9848" />
      <stop offset="100%" stop-color="#2f6b4e" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#wm2-sky)" />

  <!-- Clouds -->
  <ellipse cx="180" cy="80" rx="90" ry="14" fill="#fbfaf5" opacity="0.55" />
  <ellipse cx="580" cy="65" rx="110" ry="13" fill="#fbfaf5" opacity="0.45" />

  <!-- Watzmann massif (distinctive double peak) -->
  <path
    d="M0 260 L80 180 L160 220 L250 135 L310 175 L370 130 L440 175 L500 200 L580 155 L660 195 L740 165 L800 195 L800 310 L0 310 Z"
    fill="#6a8aaa"
  />
  <!-- Watzmann main summit snow -->
  <path d="M232 152 L250 135 L268 156 L250 168 Z" fill="#fbfaf5" opacity="0.8" />
  <path d="M352 145 L370 130 L388 148 L370 162 Z" fill="#fbfaf5" opacity="0.8" />
  <!-- Subsidiary snow caps -->
  <path d="M562 170 L580 155 L597 172 L580 183 Z" fill="#fbfaf5" opacity="0.7" />

  <!-- Mid tree belt -->
  <path
    d="M0 310 Q200 298 400 308 Q600 318 800 305 L800 370 L0 370 Z"
    fill="#3a6038"
  />
  <!-- Fir tree silhouettes in belt -->
  <g fill="#1f4a36">
    <polygon points="80,310 72,330 88,330" />
    <polygon points="80,296 71,314 89,314" />
    <polygon points="160,308 152,328 168,328" />
    <polygon points="160,294 151,312 169,312" />
    <polygon points="520,305 512,325 528,325" />
    <polygon points="520,291 511,309 529,309" />
    <polygon points="620,308 612,328 628,328" />
    <polygon points="620,294 611,312 629,312" />
  </g>

  <!-- Meadow -->
  <path
    d="M0 360 Q200 350 400 360 Q600 370 800 355 L800 500 L0 500 Z"
    fill="url(#wm2-meadow)"
  />

  <!-- Flower patches on meadow -->
  <g>
    <circle cx="80" cy="400" r="3" fill="#f0a95c" />
    <circle cx="100" cy="420" r="2.5" fill="#fbfaf5" />
    <circle cx="140" cy="408" r="3" fill="#f0a95c" />
    <circle cx="300" cy="415" r="3" fill="#fbfaf5" />
    <circle cx="340" cy="430" r="2.5" fill="#f0a95c" />
    <circle cx="560" cy="405" r="3" fill="#f0a95c" />
    <circle cx="600" cy="420" r="2.5" fill="#fbfaf5" />
    <circle cx="700" cy="410" r="3" fill="#f0a95c" />
    <circle cx="740" cy="428" r="2.5" fill="#fbfaf5" />
  </g>

  <!-- Almhütte (mountain farmhouse) -->
  <g transform="translate(430 340)">
    <!-- Foundation / base -->
    <rect x="0" y="55" width="150" height="8" fill="#3a2a18" />
    <!-- Walls (light wood/plaster) -->
    <rect x="0" y="20" width="150" height="45" fill="#d4b888" />
    <!-- Wooden lower half -->
    <rect x="0" y="42" width="150" height="23" fill="#8a6040" />
    <!-- Saddle roof -->
    <polygon points="-6,20 75,-20 156,20" fill="#4a2c18" />
    <!-- Left gable (darker) -->
    <polygon points="0,20 0,62 -18,62 -18,30" fill="#7a5030" />
    <!-- Windows -->
    <rect x="12" y="26" width="22" height="16" rx="2" fill="#f0d8a0" opacity="0.9" />
    <rect x="62" y="26" width="22" height="16" rx="2" fill="#f0d8a0" opacity="0.9" />
    <rect x="112" y="26" width="22" height="16" rx="2" fill="#f0d8a0" opacity="0.9" />
    <!-- Door -->
    <rect x="62" y="38" width="26" height="24" rx="2" fill="#3a2010" />
    <!-- Chimney -->
    <rect x="108" y="-28" width="14" height="26" fill="#5a3a20" />
    <rect x="105" y="-32" width="20" height="6" rx="1" fill="#3a2010" />
    <!-- Balcony rail suggestion -->
    <rect x="0" y="20" width="150" height="3" fill="#5a3a20" opacity="0.5" />
  </g>

  <!-- Cow 1 -->
  <g transform="translate(180 390)">
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#f0ece0" />
    <!-- cow spots -->
    <ellipse cx="-8" cy="-2" rx="9" ry="7" fill="#3a2a18" opacity="0.6" />
    <ellipse cx="10" cy="4" rx="7" ry="5" fill="#3a2a18" opacity="0.5" />
    <!-- head -->
    <ellipse cx="-28" cy="-3" rx="11" ry="9" fill="#f0ece0" />
    <!-- ear -->
    <ellipse cx="-36" cy="-10" rx="4" ry="6" fill="#e0c8a0" />
    <!-- eye -->
    <circle cx="-32" cy="-4" r="2" fill="#2a1a08" />
    <!-- nose -->
    <ellipse cx="-38" cy="2" rx="4" ry="2.5" fill="#d0a888" />
    <!-- legs -->
    <rect x="-20" y="13" width="5" height="18" rx="1" fill="#e0d8c8" />
    <rect x="-8" y="13" width="5" height="18" rx="1" fill="#e0d8c8" />
    <rect x="6" y="13" width="5" height="18" rx="1" fill="#e0d8c8" />
    <rect x="18" y="13" width="5" height="18" rx="1" fill="#e0d8c8" />
    <!-- tail -->
    <path d="M28,0 Q40,-8 38,8" fill="none" stroke="#c0b090" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Cow 2 (further away, smaller) -->
  <g transform="translate(310 400) scale(0.78)">
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#7a5a38" />
    <ellipse cx="-28" cy="-3" rx="11" ry="9" fill="#7a5a38" />
    <ellipse cx="-36" cy="-10" rx="4" ry="6" fill="#6a4a28" />
    <circle cx="-32" cy="-4" r="2" fill="#2a1a08" />
    <rect x="-20" y="13" width="5" height="18" rx="1" fill="#6a4a30" />
    <rect x="-8" y="13" width="5" height="18" rx="1" fill="#6a4a30" />
    <rect x="6" y="13" width="5" height="18" rx="1" fill="#6a4a30" />
    <rect x="18" y="13" width="5" height="18" rx="1" fill="#6a4a30" />
  </g>

  <!-- Cow 3 (background, small) -->
  <g transform="translate(100 395) scale(0.65)">
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#d8cdb8" />
    <ellipse cx="-28" cy="-3" rx="11" ry="9" fill="#d8cdb8" />
    <circle cx="-32" cy="-4" r="2" fill="#2a1a08" />
    <rect x="-20" y="13" width="5" height="18" rx="1" fill="#c8b8a0" />
    <rect x="-8" y="13" width="5" height="18" rx="1" fill="#c8b8a0" />
    <rect x="6" y="13" width="5" height="18" rx="1" fill="#c8b8a0" />
    <rect x="18" y="13" width="5" height="18" rx="1" fill="#c8b8a0" />
  </g>
</svg>
