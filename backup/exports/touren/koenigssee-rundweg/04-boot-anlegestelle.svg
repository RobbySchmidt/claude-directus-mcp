<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Bootsanlegestelle am Königssee">
  <defs>
    <linearGradient id="ks4-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a9cc0" />
      <stop offset="100%" stop-color="#c0daf0" />
    </linearGradient>
    <linearGradient id="ks4-lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9abf" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#2a5a7a" />
    </linearGradient>
    <linearGradient id="ks4-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a4a" />
      <stop offset="100%" stop-color="#5a3a20" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#ks4-sky)" />

  <!-- Soft clouds -->
  <ellipse cx="150" cy="90" rx="80" ry="13" fill="#fbfaf5" opacity="0.45" />
  <ellipse cx="420" cy="70" rx="100" ry="11" fill="#fbfaf5" opacity="0.35" />
  <ellipse cx="680" cy="100" rx="70" ry="10" fill="#fbfaf5" opacity="0.4" />

  <!-- Far mountains -->
  <path
    d="M0 260 L100 170 L200 220 L320 145 L440 205 L560 160 L680 210 L800 175 L800 310 L0 310 Z"
    fill="#6a8aa5"
  />
  <path d="M300 162 L320 145 L340 166 L320 178 Z" fill="#fbfaf5" opacity="0.8" />
  <path d="M542 176 L560 160 L577 179 L560 190 Z" fill="#fbfaf5" opacity="0.75" />

  <!-- Mid mountains / treeline -->
  <path
    d="M0 310 L120 265 L240 295 L380 255 L500 280 L640 258 L800 275 L800 360 L0 360 Z"
    fill="#2f6b4e"
  />

  <!-- Lake surface -->
  <rect x="0" y="350" width="800" height="150" fill="url(#ks4-lake)" />

  <!-- Water ripples near dock -->
  <g stroke="#fbfaf5" stroke-width="1" opacity="0.22">
    <ellipse cx="540" cy="400" rx="40" ry="5" />
    <ellipse cx="540" cy="400" rx="65" ry="9" />
    <line x1="200" y1="390" x2="340" y2="388" />
    <line x1="180" y1="420" x2="360" y2="416" />
    <line x1="600" y1="430" x2="760" y2="426" />
  </g>

  <!-- Shore / grassy foreground -->
  <path
    d="M0 350 Q200 342 400 350 Q600 358 800 348 L800 380 L0 380 Z"
    fill="#3a6e3a"
  />

  <!-- Wooden dock / Steg (right side) -->
  <g fill="url(#ks4-wood)">
    <!-- Main deck planks -->
    <rect x="520" y="355" width="200" height="12" rx="2" />
    <rect x="520" y="369" width="200" height="12" rx="2" />
    <rect x="520" y="383" width="200" height="12" rx="2" />
    <!-- Dock legs -->
    <rect x="528" y="395" width="8" height="60" />
    <rect x="570" y="395" width="8" height="55" />
    <rect x="612" y="395" width="8" height="50" />
    <rect x="654" y="395" width="8" height="45" />
    <rect x="696" y="395" width="8" height="40" />
    <rect x="705" y="355" width="10" height="48" />
  </g>
  <!-- Dock railing -->
  <line x1="520" y1="358" x2="720" y2="358" stroke="#6a4a28" stroke-width="3" />
  <g stroke="#6a4a28" stroke-width="2">
    <line x1="540" y1="358" x2="540" y2="348" />
    <line x1="580" y1="358" x2="580" y2="348" />
    <line x1="620" y1="358" x2="620" y2="348" />
    <line x1="660" y1="358" x2="660" y2="348" />
    <line x1="700" y1="358" x2="700" y2="348" />
  </g>
  <line x1="520" y1="348" x2="720" y2="348" stroke="#6a4a28" stroke-width="2.5" />

  <!-- Electric boat (at dock, left of it) -->
  <g transform="translate(370 360)">
    <!-- Hull -->
    <path d="M0 30 Q10 20 30 18 L120 18 Q140 20 150 30 Q140 42 75 44 Q10 42 0 30 Z" fill="#2a4a6a" />
    <!-- Cabin -->
    <rect x="40" y="4" width="60" height="16" rx="3" fill="#fbfaf5" opacity="0.85" />
    <!-- Window -->
    <rect x="48" y="7" width="14" height="8" rx="1" fill="#9dbcd6" opacity="0.8" />
    <rect x="72" y="7" width="14" height="8" rx="1" fill="#9dbcd6" opacity="0.8" />
    <!-- Mooring line -->
    <line x1="150" y1="30" x2="180" y2="25" stroke="#8a6a4a" stroke-width="2" />
  </g>

  <!-- Mooring post -->
  <rect x="540" y="340" width="10" height="40" rx="2" fill="#5a3a20" />
  <circle cx="545" cy="340" r="6" fill="#4a2a10" />
</svg>
